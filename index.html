<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d4526">
<title>Truco Paulista</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Nunito:wght@400;700;800;900&display=swap');
:root{--verde:#1a6b3c;--verde-escuro:#0d4526;--dourado:#c9a227;--dourado-claro:#f0c040;--vermelho:#c0392b;--branco:#f5f0e8;--creme:#e8dfc8;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;width:100%;font-family:'Nunito',sans-serif;background:#0d4526;color:var(--branco);overflow:hidden;touch-action:manipulation;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 90% 70% at 50% 50%,#1e7a42 0%,#0a3018 100%);z-index:-2;}
body::after{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,0.01) 0,rgba(255,255,255,0.01) 1px,transparent 1px,transparent 10px),repeating-linear-gradient(-45deg,rgba(255,255,255,0.01) 0,rgba(255,255,255,0.01) 1px,transparent 1px,transparent 10px);z-index:-1;}

/* LOGIN */
#tela-login{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:1.5rem;gap:1.1rem;overflow-y:auto;}
.logo{font-family:'Abril Fatface',serif;font-size:clamp(2.8rem,14vw,4.5rem);color:var(--dourado-claro);text-shadow:3px 3px 0 #7a5c00,0 8px 24px rgba(0,0,0,0.5);letter-spacing:2px;line-height:1;text-align:center;}
.logo-sub{font-size:clamp(0.72rem,3vw,1rem);color:var(--creme);letter-spacing:5px;text-transform:uppercase;opacity:.75;margin-top:-.3rem;}
.card{background:rgba(8,32,16,.82);border:2px solid rgba(201,162,39,.35);border-radius:20px;padding:1.4rem;width:100%;max-width:380px;backdrop-filter:blur(10px);display:flex;flex-direction:column;gap:.85rem;}
.card h2{font-family:'Abril Fatface',serif;color:var(--dourado-claro);font-size:1.25rem;text-align:center;}
.campo label{display:block;font-size:.7rem;color:var(--creme);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:.3rem;opacity:.8;}
.campo input{width:100%;padding:.82rem 1rem;border-radius:10px;border:1.5px solid rgba(201,162,39,.25);background:rgba(0,0,0,.35);color:var(--branco);font-family:'Nunito',sans-serif;font-size:1.05rem;font-weight:700;outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none;}
.campo input:focus{border-color:var(--dourado);background:rgba(0,0,0,.5);}
.divisor{display:flex;align-items:center;gap:.7rem;color:rgba(245,240,232,.35);font-size:.78rem;}
.divisor::before,.divisor::after{content:'';flex:1;height:1px;background:rgba(245,240,232,.15);}
.btn{width:100%;padding:.88rem;border-radius:12px;border:none;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:transform .1s,opacity .1s;letter-spacing:.4px;user-select:none;}
.btn:active{transform:scale(.97);opacity:.87;}
.btn-ouro{background:linear-gradient(135deg,#c9a227,#f0c040);color:#2a1500;}
.btn-ghost{background:rgba(255,255,255,.09);color:var(--branco);border:1.5px solid rgba(255,255,255,.18);}
.btn-red{background:linear-gradient(135deg,#c0392b,#e74c3c);color:#fff;}
.btn-green{background:linear-gradient(135deg,#145e30,#27ae60);color:#fff;}
.hint{font-size:.74rem;color:rgba(245,240,232,.42);text-align:center;line-height:1.55;max-width:280px;}
.hint a{color:var(--dourado-claro);}

/* AGUARDANDO */
#tela-aguardando{display:none;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:2rem;gap:1.1rem;text-align:center;}
.codigo-sala{font-family:'Abril Fatface',serif;font-size:clamp(3rem,16vw,5rem);color:var(--dourado-claro);letter-spacing:10px;text-shadow:3px 3px 0 #7a5c00;}
.pulse{width:54px;height:54px;border-radius:50%;background:rgba(201,162,39,.25);animation:pulseA 1.4s ease-in-out infinite;display:flex;align-items:center;justify-content:center;font-size:1.6rem;}
@keyframes pulseA{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.18);opacity:1}}

/* JOGO */
#tela-jogo{display:none;flex-direction:column;height:100%;max-width:480px;margin:0 auto;padding:max(env(safe-area-inset-top),8px) 8px max(env(safe-area-inset-bottom),8px);gap:5px;}

/* Placar */
.placar{display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.42);border:1px solid rgba(201,162,39,.2);border-radius:14px;padding:6px 12px;flex-shrink:0;}
.ptime{display:flex;flex-direction:column;align-items:center;min-width:68px;}
.pnome{font-size:.67rem;color:var(--creme);opacity:.62;text-transform:uppercase;letter-spacing:1px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px;}
.ppts{font-family:'Abril Fatface',serif;font-size:2rem;color:var(--dourado-claro);line-height:1;}
.pcentro{display:flex;flex-direction:column;align-items:center;gap:4px;}
.pinfo{font-size:.6rem;color:rgba(245,240,232,.42);text-transform:uppercase;letter-spacing:1px;}
.rod-bols{display:flex;gap:5px;}
.bol{width:13px;height:13px;border-radius:50%;border:2px solid rgba(255,255,255,.2);}
.bol.ganhou{background:var(--dourado-claro);border-color:var(--dourado);}
.bol.perdeu{background:#e74c3c;border-color:#922b21;}
.bol.empate{background:rgba(255,255,255,.35);border-color:rgba(255,255,255,.4);}

/* Status */
.sb{text-align:center;font-size:.82rem;color:var(--creme);opacity:.75;min-height:22px;flex-shrink:0;padding:0 4px;}
.sb.minha{color:var(--dourado-claro);opacity:1;font-weight:800;animation:bT 1s ease-in-out infinite;}
@keyframes bT{0%,100%{opacity:1}50%{opacity:.55}}
.dot{width:7px;height:7px;border-radius:50%;background:var(--dourado-claro);display:inline-block;margin-right:5px;animation:bT 1s ease-in-out infinite;}

/* Adversário */
.adv-area{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;}
.adv-nome{font-size:.66rem;color:rgba(245,240,232,.48);text-transform:uppercase;letter-spacing:1px;font-weight:700;}
.adv-cartas{display:flex;justify-content:center;gap:6px;min-height:68px;align-items:center;}

/* Mesa centro */
.mesa-centro{flex:1;display:flex;align-items:center;justify-content:center;gap:18px;min-height:88px;}
.vira-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;}
.vira-lbl{font-size:.58rem;color:rgba(245,240,232,.38);text-transform:uppercase;letter-spacing:1px;}
.jogadas{display:flex;gap:9px;align-items:center;min-width:120px;justify-content:center;}

/* Minha mão */
.minha-mao-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;}
.minha-mao{display:flex;justify-content:center;align-items:flex-end;gap:clamp(-8px,-1vw,6px);padding-bottom:2px;min-height:clamp(92px,22vw,118px);}
.tap-hint{font-size:.68rem;color:rgba(245,240,232,.4);text-align:center;min-height:16px;}

/* Ações */
.acoes{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;flex-shrink:0;padding:2px 0 2px;}
.ba{padding:11px 20px;border-radius:50px;border:none;font-family:'Nunito',sans-serif;font-weight:800;font-size:.88rem;cursor:pointer;transition:transform .12s,box-shadow .12s;user-select:none;min-height:46px;}
.ba:active{transform:scale(.93);}
.ba-truco{background:linear-gradient(135deg,#b0331f,#e74c3c);color:#fff;box-shadow:0 4px 14px rgba(192,57,43,.35);}
.ba-aceitar{background:linear-gradient(135deg,#145e30,#27ae60);color:#fff;box-shadow:0 4px 14px rgba(27,174,96,.35);}
.ba-fugir{background:rgba(90,90,100,.55);color:var(--branco);border:1.5px solid rgba(255,255,255,.15);}
.ba-aumentar{background:linear-gradient(135deg,#a06a08,#f0a820);color:#2a1000;box-shadow:0 4px 14px rgba(192,144,0,.3);}

/* CARTAS */
.carta{border-radius:9px;border:2px solid;display:flex;flex-direction:column;justify-content:space-between;padding:3px 4px;position:relative;user-select:none;transition:transform .18s cubic-bezier(.34,1.56,.64,1),box-shadow .18s;flex-shrink:0;cursor:pointer;}
.cn{width:clamp(62px,16vw,78px);height:clamp(94px,24vw,118px);}
.cm{width:clamp(50px,13vw,64px);height:clamp(74px,19vw,92px);}
.cv{width:clamp(46px,12vw,58px);height:clamp(68px,17vw,84px);}
.cvs{width:clamp(42px,11vw,54px);height:clamp(62px,16vw,78px);}
.cf{background:#fffdf5;border-color:#d4c9a0;}
.cf.ouros,.cf.copas{color:#c0392b;}
.cf.espadas{color:#1a3566;}
.cf.paus{color:#1a4a1a;}
.cverso{background:linear-gradient(145deg,#1c4f2a,#0c2e18);border-color:#c9a227;cursor:default;}
.cverso::after{content:'🃏';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.5rem;opacity:.5;}
.cjogada{cursor:default;}
.cdisabled{cursor:not-allowed;opacity:.55;}
.csel{transform:translateY(-20px) scale(1.08)!important;box-shadow:0 16px 32px rgba(240,192,64,.5)!important;}
.cv-top{font-size:clamp(.7rem,2.2vw,.88rem);font-weight:800;line-height:1.1;display:flex;flex-direction:column;align-items:flex-start;}
.cv-bot{font-size:clamp(.7rem,2.2vw,.88rem);font-weight:800;line-height:1.1;display:flex;flex-direction:column;align-items:flex-end;transform:rotate(180deg);}
.cv-big{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(1.2rem,3.5vw,1.7rem);opacity:.17;pointer-events:none;}
.cnum{font-size:clamp(.95rem,3vw,1.25rem);font-weight:900;line-height:1;}
.csim{font-size:clamp(.65rem,2vw,.82rem);line-height:1;}
.manilha{box-shadow:0 0 0 2.5px var(--dourado-claro),0 4px 14px rgba(240,192,64,.4)!important;}

/* OVERLAY */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.67);display:none;align-items:center;justify-content:center;z-index:200;padding:1.5rem;}
.modal{background:linear-gradient(160deg,#183d22,#0c2014);border:2px solid var(--dourado);border-radius:20px;padding:1.8rem 1.4rem;max-width:320px;width:100%;text-align:center;display:flex;flex-direction:column;gap:.95rem;box-shadow:0 24px 64px rgba(0,0,0,.7);}
.modal h2{font-family:'Abril Fatface',serif;font-size:1.65rem;color:var(--dourado-claro);}
.modal p{color:var(--creme);line-height:1.55;font-size:.93rem;white-space:pre-wrap;}
.modal-acoes{display:flex;gap:.65rem;justify-content:center;flex-wrap:wrap;}
.modal-acoes .btn{max-width:145px;}

/* TOAST */
#toast{position:fixed;bottom:calc(max(env(safe-area-inset-bottom),12px) + 8px);left:50%;transform:translateX(-50%) translateY(80px);background:rgba(8,28,14,.96);border:1.5px solid var(--dourado);color:var(--dourado-claro);padding:.62rem 1.4rem;border-radius:50px;font-family:'Abril Fatface',serif;font-size:.93rem;letter-spacing:.4px;z-index:300;transition:transform .28s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none;max-width:90vw;overflow:hidden;text-overflow:ellipsis;}
#toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="tela-login">
  <div class="logo">🃏 Truco</div>
  <div class="logo-sub">Paulista</div>
  <div class="card">
    <h2>Entrar na Partida</h2>
    <div class="campo">
      <label>Seu Nome</label>
      <input id="inp-nome" type="text" placeholder="Ex: João" maxlength="12" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <button class="btn btn-ouro" onclick="criarSala()">🎲 Criar Nova Sala</button>
    <div class="divisor">ou entre em uma sala existente</div>
    <div class="campo">
      <label>Código da Sala</label>
      <input id="inp-codigo" type="text" placeholder="Ex: AB12" maxlength="4" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" oninput="this.value=this.value.toUpperCase()">
    </div>
    <button class="btn btn-ghost" onclick="entrarSala()">🚪 Entrar na Sala</button>
    <div class="hint" id="hint-config">⚙️ Configure o Firebase em <code>config.js</code> para jogar online.</div>
  </div>
</div>

<!-- AGUARDANDO -->
<div id="tela-aguardando">
  <div class="logo" style="font-size:clamp(2rem,9vw,3rem)">🃏 Truco Paulista</div>
  <div class="pulse">⏳</div>
  <div style="color:var(--creme);font-size:.83rem;opacity:.7">Código da Sala</div>
  <div class="codigo-sala" id="exibe-codigo">----</div>
  <div class="hint">Mande este código para seu amigo entrar na sala!</div>
  <button class="btn btn-ghost" style="max-width:280px" onclick="copiarCodigo()">📋 Copiar Código</button>
  <button class="btn btn-red" style="max-width:280px;margin-top:4px" onclick="sairSala()">✖ Cancelar</button>
</div>

<!-- JOGO -->
<div id="tela-jogo">
  <div class="placar">
    <div class="ptime"><div class="pnome" id="pnome-adv">Adversário</div><div class="ppts" id="ppts-adv">0</div></div>
    <div class="pcentro">
      <div class="pinfo" id="plbl-rod">Rodada 1/3</div>
      <div class="rod-bols" id="bols-rod"></div>
      <div class="pinfo">até 12 pts</div>
    </div>
    <div class="ptime"><div class="pnome" id="pnome-eu">Você</div><div class="ppts" id="ppts-eu">0</div></div>
  </div>

  <div class="sb" id="statusbar">Carregando...</div>

  <div class="adv-area">
    <div class="adv-nome" id="adv-nome">Adversário</div>
    <div class="adv-cartas" id="adv-cartas"></div>
  </div>

  <div class="mesa-centro">
    <div class="vira-wrap">
      <div class="vira-lbl">Vira</div>
      <div id="vira-el"></div>
    </div>
    <div class="jogadas" id="jogadas"></div>
  </div>

  <div class="minha-mao-wrap">
    <div class="minha-mao" id="minha-mao"></div>
    <div class="tap-hint" id="tap-hint"></div>
  </div>

  <div class="acoes" id="acoes"></div>
</div>

<!-- OVERLAY -->
<div id="overlay">
  <div class="modal">
    <h2 id="modal-tit"></h2>
    <p id="modal-txt"></p>
    <div class="modal-acoes" id="modal-ac"></div>
  </div>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="config.js"></script>
<script>
// ── ESTADO ──────────────────────────────────────────────────
let db=null,salaRef=null,meuId=null,meuNome='',salaId='',estadoJogo=null,cartaSel=null;

// ── CONSTANTES ───────────────────────────────────────────────
const NAIPES=['ouros','espadas','copas','paus'];
const SIM={ouros:'♦',espadas:'♠',copas:'♥',paus:'♣'};
const VALS=['4','5','6','7','Q','J','K','A','2','3'];

function getOrdem(carta,man){
  if(!carta)return-1;
  const mi=man.indexOf(carta.id);
  if(mi!==-1)return 14+(3-mi);
  return VALS.indexOf(carta.valor);
}
function calcMan(vira){
  const nxt=VALS[(VALS.indexOf(vira.valor)+1)%VALS.length];
  return['paus','copas','espadas','ouros'].map(n=>`${nxt}_${n}`);
}
function criarBaralho(){
  const b=[];
  for(const n of NAIPES)for(const v of VALS)b.push({id:`${v}_${n}`,valor:v,naipe:n});
  return b;
}
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// ── FIREBASE ────────────────────────────────────────────────
function initFirebase(){
  try{
    if(typeof FIREBASE_CONFIG!=='undefined'){
      firebase.initializeApp(FIREBASE_CONFIG);
      db=firebase.database();
      document.getElementById('hint-config').style.display='none';
      return true;
    }
  }catch(e){}
  return false;
}

// ── SALA ────────────────────────────────────────────────────
function gerarCod(){return Array.from({length:4},()=>'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'[Math.floor(Math.random()*32)]).join('');}

function criarSala(){
  const nome=document.getElementById('inp-nome').value.trim();
  if(!nome){toast('Digite seu nome!');return;}
  if(!db){toast('Configure o Firebase primeiro!');return;}
  meuNome=nome;meuId='j1';salaId=gerarCod();
  salaRef=db.ref(`salas/${salaId}`);
  salaRef.set({jogadores:{j1:{nome,online:true}},status:'aguardando',pontos:{j1:0,j2:0},criador:'j1'})
    .then(()=>{tela('aguardando');document.getElementById('exibe-codigo').textContent=salaId;ouvirSala();});
}

function entrarSala(){
  const nome=document.getElementById('inp-nome').value.trim();
  const cod=document.getElementById('inp-codigo').value.trim().toUpperCase();
  if(!nome){toast('Digite seu nome!');return;}
  if(cod.length!==4){toast('Código deve ter 4 letras!');return;}
  if(!db){toast('Configure o Firebase!');return;}
  meuNome=nome;meuId='j2';salaId=cod;
  salaRef=db.ref(`salas/${salaId}`);
  salaRef.once('value',snap=>{
    const d=snap.val();
    if(!d){toast('Sala não encontrada!');return;}
    if(d.status!=='aguardando'){toast('Sala já em jogo!');return;}
    salaRef.child('jogadores/j2').set({nome,online:true});
    salaRef.child('status').set('iniciando');
    tela('jogo');ouvirSala();
  });
}

function ouvirSala(){
  salaRef.on('value',snap=>{
    const d=snap.val();if(!d)return;
    estadoJogo=d;
    if(d.status==='iniciando'&&meuId==='j1')iniciarPartida();
    else if(d.status==='jogando'||d.status==='mao11'){tela('jogo');render();}
    else if(d.status==='fim')mostrarFim(d);
  });
}

function sairSala(){if(salaRef)salaRef.remove();location.reload();}
function copiarCodigo(){
  navigator.clipboard?.writeText(salaId).then(()=>toast('Código copiado! 📋'))
    .catch(()=>toast(`Código: ${salaId}`));
}

// ── PARTIDA ──────────────────────────────────────────────────
function iniciarPartida(){
  const b=shuffle(criarBaralho());
  const vira=b[6];
  salaRef.set({
    ...estadoJogo,status:'jogando',vira,manilhas:calcMan(vira),
    maos:{j1:b.slice(0,3),j2:b.slice(3,6)},
    cartasNaMesa:{j1:null,j2:null},
    vez:'j1',rodada:1,resultadosRodada:[],
    valorMao:2,trucoStatus:'normal',trucoPedidoPor:null,gritouTruco:false,
    mao11:{j1:false,j2:false}
  });
}

function novaMao(estado){
  const b=shuffle(criarBaralho());
  const vira=b[6];
  const novo={
    ...estado,vira,manilhas:calcMan(vira),
    maos:{j1:b.slice(0,3),j2:b.slice(3,6)},
    cartasNaMesa:{j1:null,j2:null},
    vez:estado.vezProxima||'j1',
    rodada:1,resultadosRodada:[],
    valorMao:2,trucoStatus:'normal',trucoPedidoPor:null,gritouTruco:false,
    mao11:{j1:false,j2:false},status:'jogando'
  };
  const pts=estado.pontos;
  if(pts.j1===11||pts.j2===11)novo.status='mao11';
  salaRef.set(novo);
}

// ── RENDER ──────────────────────────────────────────────────
const adv=()=>meuId==='j1'?'j2':'j1';

function render(){
  const e=estadoJogo;if(!e)return;
  const advId=adv();
  const nEu=e.jogadores?.[meuId]?.nome||'Você';
  const nAdv=e.jogadores?.[advId]?.nome||'Adversário';

  // placar
  document.getElementById('pnome-eu').textContent=nEu;
  document.getElementById('pnome-adv').textContent=nAdv;
  document.getElementById('ppts-eu').textContent=e.pontos?.[meuId]||0;
  document.getElementById('ppts-adv').textContent=e.pontos?.[advId]||0;
  document.getElementById('adv-nome').textContent=nAdv;
  document.getElementById('plbl-rod').textContent=`Rodada ${e.rodada||1}/3`;

  // bolinhas
  const bl=document.getElementById('bols-rod');bl.innerHTML='';
  for(let i=0;i<3;i++){
    const b=document.createElement('div');b.className='bol';
    const r=(e.resultadosRodada||[])[i];
    if(r===meuId)b.classList.add('ganhou');
    else if(r===advId)b.classList.add('perdeu');
    else if(r==='empate')b.classList.add('empate');
    bl.appendChild(b);
  }

  // vira
  const ve=document.getElementById('vira-el');ve.innerHTML='';
  if(e.vira)ve.appendChild(mkCarta(e.vira,'cv cjogada',e.manilhas||[]));

  // jogadas
  const je=document.getElementById('jogadas');je.innerHTML='';
  if(e.cartasNaMesa?.j1)je.appendChild(mkCarta(e.cartasNaMesa.j1,'cm cjogada',e.manilhas||[]));
  if(e.cartasNaMesa?.j2)je.appendChild(mkCarta(e.cartasNaMesa.j2,'cm cjogada',e.manilhas||[]));

  // mão adversário
  const ae=document.getElementById('adv-cartas');ae.innerHTML='';
  (e.maos?.[advId]||[]).forEach(()=>{
    const c=document.createElement('div');c.className='carta cverso cvs';ae.appendChild(c);
  });

  // minha mão
  renderMao(e);
  renderAcoes(e);

  // mão 11
  if(e.status==='mao11'&&e.pontos?.[meuId]===11&&!e.mao11?.[`${meuId}_decidiu`]){
    setTimeout(()=>modalMao11(e),300);
  }
}

function renderMao(e){
  const el=document.getElementById('minha-mao');el.innerHTML='';
  const mao=e.maos?.[meuId]||[];
  const ehVez=e.vez===meuId&&e.status==='jogando'&&e.trucoStatus==='normal';
  mao.forEach((carta,i)=>{
    const c=mkCarta(carta,`cn ${ehVez?'':'cdisabled'}`,e.manilhas||[]);
    if(ehVez){
      c.addEventListener('click',()=>tapCarta(i,c,e));
      c.addEventListener('touchend',ev=>{ev.preventDefault();tapCarta(i,c,e);},{passive:false});
    }
    el.appendChild(c);
  });
  document.getElementById('tap-hint').textContent=ehVez?'Toque 1x: selecionar  ·  2x: jogar':'';
}

function tapCarta(idx,el,e){
  if(e.vez!==meuId||e.trucoStatus!=='normal')return;
  if(cartaSel===idx){jogarCarta(idx,e);cartaSel=null;}
  else{
    document.querySelectorAll('.csel').forEach(c=>c.classList.remove('csel'));
    el.classList.add('csel');cartaSel=idx;
  }
}

function mkCarta(carta,extra,man){
  const el=document.createElement('div');
  const ehM=man.includes(carta.id);
  el.className=`carta cf ${carta.naipe} ${extra} ${ehM?'manilha':''}`;
  el.innerHTML=`<div class="cv-top"><span class="cnum">${carta.valor}</span><span class="csim">${SIM[carta.naipe]}</span></div><div class="cv-big">${SIM[carta.naipe]}</div><div class="cv-bot"><span class="cnum">${carta.valor}</span><span class="csim">${SIM[carta.naipe]}</span></div>`;
  return el;
}

function renderAcoes(e){
  const sb=document.getElementById('statusbar');
  const ac=document.getElementById('acoes');ac.innerHTML='';
  const advId=adv();
  const nAdv=e.jogadores?.[advId]?.nome||'Adversário';
  const lbls={pedido_truco:'TRUCO',pedido_seis:'SEIS',pedido_nove:'NOVE',pedido_doze:'DOZE'};
  const prxL={pedido_truco:'Seis',pedido_seis:'Nove',pedido_nove:'Doze'};

  if(e.trucoStatus!=='normal'){
    const lbl=lbls[e.trucoStatus]||'TRUCO';
    if(e.trucoPedidoPor!==meuId){
      sb.innerHTML=`⚡ ${nAdv} pediu <b>${lbl}</b>!`;sb.className='sb minha';
      mkBa(ac,'✓ Aceitar','ba-aceitar',()=>respTruco('aceitar',e));
      mkBa(ac,'✗ Correr','ba-fugir',()=>respTruco('fugir',e));
      if(prxL[e.trucoStatus])mkBa(ac,`↑ ${prxL[e.trucoStatus]}`,'ba-aumentar',()=>respTruco('aumentar',e));
    }else{sb.textContent=`Você pediu ${lbl}! Aguardando...`;sb.className='sb';}
    return;
  }

  if(e.vez===meuId&&e.status==='jogando'){
    sb.innerHTML='<span class="dot"></span>Sua vez! Selecione uma carta.';sb.className='sb minha';
    const tL={2:'Truco',3:'Seis',6:'Nove',9:'Doze'}[e.valorMao];
    if(tL&&e.valorMao<12)mkBa(ac,`🔥 ${tL}!`,'ba-truco',()=>pedirTruco(e));
  }else{sb.className='sb';sb.textContent=`Vez de ${nAdv}...`;}
}

function mkBa(parent,txt,cls,fn){
  const b=document.createElement('button');
  b.className=`ba ${cls}`;b.textContent=txt;b.onclick=fn;parent.appendChild(b);
}

// ── LÓGICA ──────────────────────────────────────────────────
function jogarCarta(idx,e){
  if(e.vez!==meuId||e.trucoStatus!=='normal')return;
  const mao=[...e.maos[meuId]];
  const carta=mao.splice(idx,1)[0];
  const advId=adv();
  const upd={[`maos/${meuId}`]:mao,[`cartasNaMesa/${meuId}`]:carta};
  const cAdv=e.cartasNaMesa?.[advId];
  if(cAdv){
    const man=e.manilhas||[];
    const f1=getOrdem(carta,man),f2=getOrdem(cAdv,man);
    const v=f1>f2?meuId:f2>f1?advId:'empate';
    const res=[...(e.resultadosRodada||[]),v];
    upd['resultadosRodada']=res;
    const fim=verificarFim(res,advId);
    if(fim){upd['resultado']=fim;setTimeout(()=>processarFim(fim,e),1300);}
    else{
      const prox=v==='empate'?e.vez:v;
      upd['vez']=prox;upd['vezProxima']=prox;
      upd['rodada']=(e.rodada||1)+1;
      upd['cartasNaMesa']={j1:null,j2:null};
    }
  }else{upd['vez']=advId;}
  salaRef.update(upd);
}

function verificarFim(res,advId){
  const cEu=res.filter(r=>r===meuId).length;
  const cAd=res.filter(r=>r===advId).length;
  const cEm=res.filter(r=>r==='empate').length;
  if(cEu>=2)return{vencedor:meuId};
  if(cAd>=2)return{vencedor:advId};
  if(res.length===3){
    if(cEm===3)return{vencedor:'empate'};
    if(cEu===1&&cAd===1&&cEm===1)return{vencedor:res[0]==='empate'?res[1]:res[0]};
    if(cEm===2){const nb=res.find(r=>r!=='empate');return{vencedor:nb||'empate'};}
  }
  return null;
}

function processarFim(resultado,e){
  const advId=adv();
  const pts={...e.pontos};
  if(resultado.vencedor!=='empate')pts[resultado.vencedor]=(pts[resultado.vencedor]||0)+(e.valorMao||2);
  if(pts.j1>=12||pts.j2>=12){salaRef.update({status:'fim',pontos:pts,vencedorFinal:pts.j1>=12?'j1':'j2'});return;}
  novaMao({...e,pontos:pts,vezProxima:resultado.vencedor==='empate'?'j1':resultado.vencedor});
}

function pedirTruco(e){
  const prox={2:'pedido_truco',3:'pedido_seis',6:'pedido_nove',9:'pedido_doze'}[e.valorMao];
  if(!prox)return;
  salaRef.update({trucoStatus:prox,trucoPedidoPor:meuId,gritouTruco:true});
}

function respTruco(resp,e){
  const advId=adv();
  const prxV={pedido_truco:3,pedido_seis:6,pedido_nove:9,pedido_doze:12};
  const prxS={pedido_truco:'pedido_seis',pedido_seis:'pedido_nove',pedido_nove:'pedido_doze'};
  if(resp==='aceitar'){
    const nv=prxV[e.trucoStatus];
    salaRef.update({trucoStatus:'normal',valorMao:nv,trucoPedidoPor:null});
    toast(`Truco aceito! Vale ${nv} pts 🤝`);
  }else if(resp==='fugir'){
    const g=e.valorMao===2?1:e.valorMao-3;
    const pts={...e.pontos};pts[e.trucoPedidoPor]=(pts[e.trucoPedidoPor]||0)+g;
    if(pts.j1>=12||pts.j2>=12)salaRef.update({status:'fim',pontos:pts,vencedorFinal:pts.j1>=12?'j1':'j2'});
    else novaMao({...e,pontos:pts});
  }else if(resp==='aumentar'){
    const ns=prxS[e.trucoStatus];if(ns)salaRef.update({trucoStatus:ns,trucoPedidoPor:meuId});
  }
}

function modalMao11(e){
  const advId=adv();
  showModal('Mão de 11! 😮',
    'Você tem 11 pontos. Veja sua mão e decida: jogar (vale 3 pts) ou correr (adversário leva 1 pt).',
    [{txt:'🃏 Jogar!',cls:'btn-green',fn:()=>{salaRef.update({[`mao11/${meuId}_decidiu`]:'jogar',status:'jogando',valorMao:3});fecharModal();}},
     {txt:'🏃 Correr',cls:'btn-red',fn:()=>{const pts={...e.pontos};pts[advId]=(pts[advId]||0)+1;fecharModal();novaMao({...e,pontos:pts});}}]
  );
}

function mostrarFim(e){
  const v=e.vencedorFinal;
  const nome=e.jogadores?.[v]?.nome||(v===meuId?'Você':'Adversário');
  const eu=v===meuId;
  document.getElementById('modal-tit').style.color=eu?'var(--dourado-claro)':'#e74c3c';
  showModal(eu?'🏆 Você ganhou!':'😔 Você perdeu!',
    `${nome} venceu!\n${e.pontos?.j1||0} × ${e.pontos?.j2||0}`,
    [{txt:'🔄 Jogar de Novo',cls:'btn-green',fn:()=>{fecharModal();if(meuId==='j1')novaMao({...e,pontos:{j1:0,j2:0}});else toast('Aguardando o host reiniciar...');}},
     {txt:'✖ Sair',cls:'btn-red',fn:()=>{salaRef.remove();location.reload();}}]
  );
}

function showModal(tit,txt,acoes){
  document.getElementById('modal-tit').textContent=tit;
  document.getElementById('modal-txt').textContent=txt;
  const ac=document.getElementById('modal-ac');ac.innerHTML='';
  acoes.forEach(a=>{const b=document.createElement('button');b.className=`btn ${a.cls}`;b.textContent=a.txt;b.onclick=a.fn;ac.appendChild(b);});
  document.getElementById('overlay').style.display='flex';
}
function fecharModal(){document.getElementById('overlay').style.display='none';}

// ── UTILS ────────────────────────────────────────────────────
function tela(nome){
  document.getElementById('tela-login').style.display     =nome==='login'     ?'flex':'none';
  document.getElementById('tela-aguardando').style.display=nome==='aguardando'?'flex':'none';
  document.getElementById('tela-jogo').style.display      =nome==='jogo'      ?'flex':'none';
}
let _tt;
function toast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2700);
}

// ── BOOT ─────────────────────────────────────────────────────
window.addEventListener('load',()=>{
  initFirebase();tela('login');
  document.getElementById('inp-nome').addEventListener('keypress',ev=>{if(ev.key==='Enter')criarSala();});
  document.getElementById('inp-codigo').addEventListener('keypress',ev=>{if(ev.key==='Enter')entrarSala();});
  // evitar zoom duplo toque iOS
  let lt=0;
  document.addEventListener('touchend',ev=>{const n=Date.now();if(n-lt<280)ev.preventDefault();lt=n;},{passive:false});
});
</script>
